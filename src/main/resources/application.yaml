spring:
  application:
    name: cesi-zen-back

  datasource:
    url: jdbc:postgresql://localhost:5432/cesizenDb
    username: cesizenUser
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

security:
  jwt:
    secret: long-random-secret-for-cesizen-project
    issuer: cesi-zen-back
    access-token-validity-minutes: 15